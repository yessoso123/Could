/* ---------------- localStorage 存檔 ---------------- */

const SAVE_KEY = "mecha_vanguard_save_v1";

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultSave();
    const parsed = JSON.parse(raw);
    return { ...defaultSave(), ...parsed };
  } catch {
    return defaultSave();
  }
}

function defaultSave() {
  return {
    ownedCardIds: CARD_POOL.slice(0, 4).map((c) => c.id), // 初始擁有4張
    team: CARD_POOL.slice(0, 4).map((c) => c.id),
    currency: 300,
    highestWaveCleared: 0,
    cardLevels: Object.fromEntries(CARD_POOL.map((c) => [c.id, 1])),
  };
}

function persistSave(save) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(save));
  } catch {
    /* storage unavailable — silently ignore */
  }
}

/* ---------------- 戰鬥用實例建立 ---------------- */

function instantiateUnit(card, side, level = 1) {
  const lvMult = 1 + (level - 1) * 0.12;
  return {
    uid: `${side}_${card.id}_${Math.random().toString(36).slice(2, 7)}`,
    cardId: card.id,
    name: card.name,
    series: card.series,
    rarity: card.rarity,
    element: card.element,
    side,
    level,
    maxHp: Math.round(card.hp * lvMult),
    hp: Math.round(card.hp * lvMult),
    atk: Math.round(card.atk * lvMult),
    def: Math.round(card.def * lvMult),
    spd: card.spd,
    skill: card.skill,
    ult: card.ult,
    ultCharge: 0,
    ultMaxCharge: 100,
    cooldowns: {},
    buffs: [], // {stat, amount, turns, isDebuff}
    taunting: false,
    stunned: false,
    alive: true,
  };
}

/* ---------------- 戰鬥引擎（純函式，狀態不可變風格） ---------------- */

function getEffectiveStat(unit, stat) {
  let base = unit[stat];
  for (const b of unit.buffs) {
    if (b.stat === stat) {
      base = base * (1 + (b.isDebuff ? -b.amount : b.amount));
    }
  }
  return Math.max(1, Math.round(base));
}

function pickTarget(actor, enemies, mode) {
  const aliveEnemies = enemies.filter((e) => e.alive);
  if (aliveEnemies.length === 0) return null;
  const taunters = aliveEnemies.filter((e) => e.taunting);
  const pool = taunters.length > 0 ? taunters : aliveEnemies;
  if (mode === "lowestHp") {
    return pool.reduce((a, b) => (a.hp / a.maxHp < b.hp / b.maxHp ? a : b));
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function computeDamage(actor, target, power, ignoreDefPct = 0) {
  const atk = getEffectiveStat(actor, "atk");
  let def = getEffectiveStat(target, "def");
  def = def * (1 - ignoreDefPct);
  let elemMult = 1;
  if (ADVANTAGE[actor.element] === target.element) elemMult = 1.25;
  else if (ADVANTAGE[target.element] === actor.element) elemMult = 0.8;
  const raw = atk * power * elemMult - def * 0.5;
  const variance = 0.9 + Math.random() * 0.2;
  const isCrit = Math.random() < 0.12;
  let dmg = Math.max(10, Math.round(raw * variance));
  if (isCrit) dmg = Math.round(dmg * 1.6);
  return { dmg, isCrit, elemMult };
}

/* 執行單一行動，回傳事件序列供動畫層播放，並回傳更新後的雙方陣容 */
function executeTurn(actor, allies, enemies, useUlt) {
  const events = [];
  const skill = useUlt ? actor.ult : actor.skill;

  if (actor.stunned) {
    events.push({ type: "stunned", actorUid: actor.uid });
    return { events, allies, enemies };
  }

  let newAllies = allies.map((u) => ({ ...u, buffs: [...u.buffs] }));
  let newEnemies = enemies.map((u) => ({ ...u, buffs: [...u.buffs] }));

  const applyDamage = (targetUid, amount, isCrit) => {
    newEnemies = newEnemies.map((e) => {
      if (e.uid !== targetUid) return e;
      const hp = Math.max(0, e.hp - amount);
      return { ...e, hp, alive: hp > 0 };
    });
  };
  const applyHealSelfSide = (pct) => {
    newAllies = newAllies.map((a) =>
      a.alive ? { ...a, hp: Math.min(a.maxHp, Math.round(a.hp + a.maxHp * pct)) } : a
    );
  };
  const applyBuffToSelf = (stat, amount, turns) => {
    newAllies = newAllies.map((a) =>
      a.uid === actor.uid ? { ...a, buffs: [...a.buffs, { stat, amount, turns, isDebuff: false }] } : a
    );
  };
  const applyTeamBuff = (stat, amount, turns) => {
    newAllies = newAllies.map((a) =>
      a.alive ? { ...a, buffs: [...a.buffs, { stat, amount, turns, isDebuff: false }] } : a
    );
  };
  const applyDebuffToTarget = (targetUid, stat, amount, turns) => {
    newEnemies = newEnemies.map((e) =>
      e.uid === targetUid ? { ...e, buffs: [...e.buffs, { stat, amount, turns, isDebuff: true }] } : e
    );
  };
  const applyStun = (targetUid, turns) => {
    newEnemies = newEnemies.map((e) => (e.uid === targetUid ? { ...e, stunned: true, stunTurns: turns } : e));
  };
  const applyTaunt = (targetUidSelf, turns) => {
    newAllies = newAllies.map((a) => (a.uid === targetUidSelf ? { ...a, taunting: true, tauntTurns: turns } : a));
  };

  if (skill.type === "aoe") {
    const targets = newEnemies.filter((e) => e.alive);
    targets.forEach((t) => {
      const { dmg, isCrit, elemMult } = computeDamage(actor, t, skill.power, skill.effect?.ignoreDef || 0);
      applyDamage(t.uid, dmg, isCrit);
      events.push({ type: "damage", actorUid: actor.uid, targetUid: t.uid, dmg, isCrit, elemMult, element: actor.element });
      if (skill.effect?.debuff === "stun" && Math.random() < (skill.effect.chance || 1)) {
        applyStun(t.uid, skill.effect.turns || 1);
        events.push({ type: "stun", targetUid: t.uid });
      } else if (skill.effect?.debuff) {
        applyDebuffToTarget(t.uid, skill.effect.debuff, skill.effect.amount, skill.effect.turns);
        events.push({ type: "debuff", targetUid: t.uid, stat: skill.effect.debuff });
      }
    });
    if (skill.effect?.teamHeal) {
      applyHealSelfSide(skill.effect.teamHeal);
      events.push({ type: "teamHeal", side: actor.side, pct: skill.effect.teamHeal });
    }
  } else if (skill.type === "self") {
    if (skill.effect?.buff) applyBuffToSelf(skill.effect.buff, skill.effect.amount, skill.effect.turns);
    if (skill.effect?.heal) applyHealSelfSide(skill.effect.heal);
    events.push({ type: "selfBuff", actorUid: actor.uid });
  } else {
    const mode = skill.type === "lowestHp" ? "lowestHp" : "normal";
    const target = pickTarget(actor, newEnemies, mode);
    if (!target) return { events, allies: newAllies, enemies: newEnemies };

    let ignoreDef = skill.effect?.ignoreDef || 0;
    let power = skill.power;

    if (skill.effect?.execute && target.hp / target.maxHp <= skill.effect.execute) {
      const dmg = target.hp;
      applyDamage(target.uid, dmg, true);
      events.push({ type: "execute", actorUid: actor.uid, targetUid: target.uid, dmg });
    } else {
      const { dmg, isCrit, elemMult } = computeDamage(actor, target, power, ignoreDef);
      applyDamage(target.uid, dmg, isCrit);
      events.push({ type: "damage", actorUid: actor.uid, targetUid: target.uid, dmg, isCrit, elemMult, element: actor.element });

      if (skill.effect?.lifesteal) {
        const healAmt = Math.round(dmg * skill.effect.lifesteal);
        newAllies = newAllies.map((a) =>
          a.uid === actor.uid ? { ...a, hp: Math.min(a.maxHp, a.hp + healAmt) } : a
        );
        events.push({ type: "lifesteal", actorUid: actor.uid, amount: healAmt });
      }
      if (skill.effect?.taunt) applyTaunt(actor.uid, skill.effect.turns || 1);
      if (skill.effect?.debuff === "stun") {
        if (Math.random() < (skill.effect.chance || 1)) {
          applyStun(target.uid, skill.effect.turns || 1);
          events.push({ type: "stun", targetUid: target.uid });
        }
      } else if (skill.effect?.debuff) {
        applyDebuffToTarget(target.uid, skill.effect.debuff, skill.effect.amount, skill.effect.turns);
        events.push({ type: "debuff", targetUid: target.uid, stat: skill.effect.debuff });
      }
      if (skill.effect?.buff && skill.effect.self) {
        applyBuffToSelf(skill.effect.buff, skill.effect.amount, skill.effect.turns);
      }
      if (skill.effect?.teamBuff) {
        applyTeamBuff(skill.effect.teamBuff, skill.effect.amount, skill.effect.turns);
        events.push({ type: "teamBuff", side: actor.side });
      }
    }
  }

  // 充能與冷卻結算
  newAllies = newAllies.map((a) => {
    if (a.uid !== actor.uid) return a;
    if (useUlt) return { ...a, ultCharge: 0 };
    return { ...a, ultCharge: Math.min(a.ultMaxCharge, a.ultCharge + 34) };
  });

  return { events, allies: newAllies, enemies: newEnemies };
}

function tickEndOfTurnStatuses(units) {
  return units.map((u) => {
    if (!u.alive) return u;
    const buffs = u.buffs
      .map((b) => ({ ...b, turns: b.turns - 1 }))
      .filter((b) => b.turns > 0);
    let stunned = u.stunned;
    let stunTurns = u.stunTurns;
    if (stunned) {
      stunTurns = (stunTurns || 1) - 1;
      if (stunTurns <= 0) stunned = false;
    }
    let taunting = u.taunting;
    let tauntTurns = u.tauntTurns;
    if (taunting) {
      tauntTurns = (tauntTurns || 1) - 1;
      if (tauntTurns <= 0) taunting = false;
    }
    return { ...u, buffs, stunned, stunTurns, taunting, tauntTurns };
  });
}

/* ---------------- 粒子特效系統（Canvas） ---------------- */

function useParticleCanvas(canvasRef) {
  const particles = useRef([]);

  const spawn = useCallback((x, y, config) => {
    const { color = "#00E5FF", count = 20, speed = 4, life = 40, size = 3, spread = Math.PI * 2, gravity = 0 } = config;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * spread - spread / 2;
      const v = speed * (0.4 + Math.random() * 0.6);
      particles.current.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        life, maxLife: life,
        size: size * (0.6 + Math.random() * 0.8),
        color, gravity,
      });
    }
  }, []);

  const spawnText = useCallback((x, y, text, color) => {
    particles.current.push({
      x, y, vx: (Math.random() - 0.5) * 0.5, vy: -1.8,
      life: 55, maxLife: 55, isText: true, text, color, size: 0,
    });
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;

    const resize = () => {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    };
    resize();
    window.addEventListener("resize", resize);

    const render = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.current = particles.current.filter((p) => p.life > 0);
      for (const p of particles.current) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.life -= 1;
        const alpha = Math.max(0, p.life / p.maxLife);

        if (p.isText) {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.font = "bold 22px 'Orbitron', sans-serif";
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.textAlign = "center";
          ctx.fillText(p.text, p.x, p.y);
          ctx.restore();
        } else {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
      raf = requestAnimationFrame(render);
    };
    render();

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, [canvasRef]);

  return { spawn, spawnText };
}

/* ---------------- UI 元件：卡牌 ---------------- */

function StatBar({ value, max, color, height = 8, label }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div style={{ width: "100%" }}>
      {label && (
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, fontFamily: "'Share Tech Mono', monospace", color: "#8B9BB4", marginBottom: 2 }}>
          <span>{label}</span>
          <span>{Math.round(value)}/{max}</span>
        </div>
      )}
      <div style={{ width: "100%", height, background: "#0A0E14", borderRadius: 4, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
        <div
          style={{
            width: `${pct}%`,
            height: "100%",
            background: `linear-gradient(90deg, ${color}88, ${color})`,
            boxShadow: `0 0 8px ${color}`,
            transition: "width 0.4s ease-out",
          }}
        />
      </div>
    </div>
  );
}

function UnitCard({ unit, isActive, isTargetable, onClick, sideLabel, damageFlash, healFlash }) {
  const rarity = RARITY[unit.rarity];
  const element = ELEMENT[unit.element];
  const hpPct = unit.hp / unit.maxHp;
  const isDead = !unit.alive;

  return (
    <div
      onClick={() => isTargetable && onClick && onClick(unit)}
      style={{
        position: "relative",
        width: 118,
        borderRadius: 12,
        padding: 8,
        background: isDead
          ? "linear-gradient(160deg, #14161c, #0a0b0e)"
          : `linear-gradient(160deg, #1C2331, #12161F)`,
        border: `1.5px solid ${isDead ? "#333" : rarity.color}`,
        boxShadow: isActive
          ? `0 0 22px ${rarity.glow}, 0 0 6px ${rarity.glow} inset`
          : isDead
          ? "none"
          : `0 0 10px ${rarity.glow}`,
        opacity: isDead ? 0.35 : 1,
        filter: isDead ? "grayscale(0.8)" : "none",
        cursor: isTargetable ? "pointer" : "default",
        transform: isActive ? "translateY(-6px) scale(1.04)" : damageFlash ? "translateX(2px)" : "none",
        transition: "transform 0.25s ease, box-shadow 0.3s ease, opacity 0.4s",
        animation: damageFlash ? "hitshake 0.3s ease" : healFlash ? "healpulse 0.5s ease" : isActive ? "activeGlow 1.4s ease-in-out infinite" : "none",
      }}
    >
      {/* 稀有度星 */}
      <div style={{ display: "flex", gap: 1, marginBottom: 3, justifyContent: "center" }}>
        {Array.from({ length: rarity.stars }).map((_, i) => (
          <span key={i} style={{ color: rarity.color, fontSize: 8 }}>★</span>
        ))}
      </div>

      {/* 機體圖示區（SVG 幾何構成，非圖片） */}
      <div style={{
        height: 62, borderRadius: 8, marginBottom: 6, position: "relative", overflow: "hidden",
        background: `radial-gradient(circle at 50% 30%, ${element.color}22, #0A0E1400)`,
        border: `1px solid ${element.color}44`,
      }}>
        <MechaGlyph element={unit.element} rarity={unit.rarity} stunned={unit.stunned} />
        {unit.taunting && (
          <div style={{ position: "absolute", top: 2, left: 2, fontSize: 9, color: "#FF3860", fontFamily: "'Share Tech Mono', monospace" }}>挑釁</div>
        )}
        {unit.stunned && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>💫</div>
        )}
      </div>

      <div style={{
        fontFamily: "'Noto Sans TC', sans-serif", fontWeight: 700, fontSize: 11.5,
        color: "#E8EDF5", textAlign: "center", marginBottom: 4, letterSpacing: 0.3,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>
        {unit.name}
      </div>

      <StatBar value={unit.hp} max={unit.maxHp} color={hpPct > 0.5 ? "#00E5A8" : hpPct > 0.25 ? "#FFB300" : "#FF3860"} height={7} />
      <div style={{ height: 4 }} />
      <StatBar value={unit.ultCharge} max={unit.ultMaxCharge} color="#7C4DFF" height={5} />

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5, fontSize: 9, fontFamily: "'Share Tech Mono', monospace", color: "#8B9BB4" }}>
        <span style={{ color: element.color }}>{element.icon} {element.label}</span>
        <span>Lv.{unit.level}</span>
      </div>

      {unit.buffs.length > 0 && (
        <div style={{ display: "flex", gap: 2, marginTop: 3, flexWrap: "wrap" }}>
          {unit.buffs.map((b, i) => (
            <span key={i} style={{
              fontSize: 8, padding: "1px 4px", borderRadius: 3,
              background: b.isDebuff ? "rgba(255,56,96,0.2)" : "rgba(0,229,168,0.2)",
              color: b.isDebuff ? "#FF3860" : "#00E5A8",
              border: `1px solid ${b.isDebuff ? "#FF3860" : "#00E5A8"}`,
            }}>
              {b.stat}{b.isDebuff ? "↓" : "↑"}
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

/* 用純 SVG 幾何圖形構成的機甲圖示，確保「精緻」且不依賴外部圖片 */
function MechaGlyph({ element, rarity, stunned }) {
  const el = ELEMENT[element];
  const rr = RARITY[rarity];
  return (
    <svg viewBox="0 0 100 62" width="100%" height="100%" style={{ position: "absolute", inset: 0 }}>
      <defs>
        <linearGradient id={`grad-${element}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={el.color} stopOpacity="0.9" />
          <stop offset="100%" stopColor={rr.color} stopOpacity="0.3" />
        </linearGradient>
      </defs>
      {/* 核心機體輪廓：六邊形頭部 + 對稱肩甲 */}
      <polygon points="50,10 62,18 62,34 50,42 38,34 38,18" fill={`url(#grad-${element})`} stroke={el.color} strokeWidth="1.2" opacity={stunned ? 0.4 : 0.95} />
      <rect x="20" y="24" width="14" height="20" rx="3" fill={rr.color} opacity="0.55" />
      <rect x="66" y="24" width="14" height="20" rx="3" fill={rr.color} opacity="0.55" />
      <circle cx="50" cy="24" r="4" fill="#fff" opacity="0.9">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <line x1="50" y1="42" x2="50" y2="54" stroke={el.color} strokeWidth="2" opacity="0.6" />
    </svg>
  );
}

/* ---------------- 戰鬥畫面 ---------------- */

function BattleScreen({ playerTeam, enemyTeam, waveName, onBattleEnd, onLog }) {
  const [allies, setAllies] = useState(playerTeam);
  const [enemies, setEnemies] = useState(enemyTeam);
  const [turnOrder, setTurnOrder] = useState([]);
  const [turnIdx, setTurnIdx] = useState(0);
  const [activeUid, setActiveUid] = useState(null);
  const [awaitingInput, setAwaitingInput] = useState(false);
  const [pendingUlt, setPendingUlt] = useState(false);
  const [log, setLog] = useState([]);
  const [flashMap, setFlashMap] = useState({});
  const [battleOver, setBattleOver] = useState(null);
  const [round, setRound] = useState(1);

  const canvasRef = useRef(null);
  const cardRefs = useRef({});
  const arenaRef = useRef(null);
  const { spawn, spawnText } = useParticleCanvas(canvasRef);
  const processingRef = useRef(false);

  const pushLog = (msg) => setLog((l) => [...l.slice(-40), msg]);

  // 初始化出手順序
  useEffect(() => {
    const order = [...playerTeam, ...enemyTeam]
      .filter((u) => u.alive)
      .sort((a, b) => b.spd - a.spd)
      .map((u) => u.uid);
    setTurnOrder(order);
  }, []);

  const getUnit = useCallback(
    (uid) => allies.find((u) => u.uid === uid) || enemies.find((u) => u.uid === uid),
    [allies, enemies]
  );

  const flashOn = (uid, type) => {
    setFlashMap((m) => ({ ...m, [uid]: type }));
    setTimeout(() => setFlashMap((m) => ({ ...m, [uid]: null })), 450);
  };

  const getCardCenter = (uid) => {
    const el = cardRefs.current[uid];
    const arena = arenaRef.current;
    if (!el || !arena) return { x: 100, y: 100 };
    const r = el.getBoundingClientRect();
    const ar = arena.getBoundingClientRect();
    return { x: r.left - ar.left + r.width / 2, y: r.top - ar.top + r.height / 2 };
  };

  const playEvents = async (events) => {
    for (const ev of events) {
      await new Promise((res) => setTimeout(res, 260));
      if (ev.type === "damage" || ev.type === "execute") {
        const { x, y } = getCardCenter(ev.targetUid);
        const actorEl = ELEMENT[getUnit(ev.actorUid)?.element] || ELEMENT.PLASMA;
        spawn(x, y, { color: actorEl.color, count: ev.isCrit ? 34 : 20, speed: ev.isCrit ? 6 : 4, life: 42, size: ev.isCrit ? 4 : 3 });
        spawnText(x, y - 10, ev.isCrit ? `${ev.dmg}!` : `${ev.dmg}`, ev.isCrit ? "#FFB300" : "#FF3860");
        flashOn(ev.targetUid, "damage");
        if (ev.isCrit) pushLog(`💥 暴擊！造成 ${ev.dmg} 點傷害`);
        else pushLog(`造成 ${ev.dmg} 點傷害`);
      } else if (ev.type === "lifesteal") {
        const { x, y } = getCardCenter(ev.actorUid);
        spawn(x, y, { color: "#00E5A8", count: 14, speed: 2, life: 35, size: 3 });
        spawnText(x, y - 10, `+${ev.amount}`, "#00E5A8");
        flashOn(ev.actorUid, "heal");
      } else if (ev.type === "teamHeal") {
        pushLog(`⛨ 全體回復生命`);
      } else if (ev.type === "stun") {
        const { x, y } = getCardCenter(ev.targetUid);
        spawn(x, y, { color: "#7C4DFF", count: 16, speed: 3, life: 30, size: 3 });
        pushLog(`⚡ 目標陷入暈眩`);
      } else if (ev.type === "debuff") {
        pushLog(`目標 ${ev.stat} 下降`);
      } else if (ev.type === "teamBuff") {
        pushLog(`✦ 全軍士氣提升`);
      } else if (ev.type === "selfBuff") {
        const { x, y } = getCardCenter(ev.actorUid);
        spawn(x, y, { color: "#FFB300", count: 20, speed: 2.5, life: 40, size: 3, spread: Math.PI * 2 });
        pushLog(`強化自身狀態`);
      } else if (ev.type === "stunned") {
        pushLog(`單位暈眩中，無法行動`);
      }
    }
  };

  const runAiAction = async (actor) => {
    const useUlt = actor.ultCharge >= actor.ultMaxCharge && Math.random() < 0.7;
    pushLog(`▶ ${actor.name} 使用「${useUlt ? actor.ult.name : actor.skill.name}」`);
    const result = executeTurn(actor, enemies, allies, useUlt);
    await playEvents(result.events);
    setEnemies(result.allies);
    setAllies(result.enemies);
  };

  const advanceTurn = async () => {
    if (processingRef.current) return;
    processingRef.current = true;

    let order = turnOrder.filter((uid) => {
      const u = getUnit(uid);
      return u && u.alive;
    });

    if (order.length === 0) {
      processingRef.current = false;
      return;
    }

    const idx = turnIdx % order.length;
    const uid = order[idx];
    const actor = getUnit(uid);

    if (!actor || !actor.alive) {
      setTurnIdx((i) => i + 1);
      processingRef.current = false;
      return;
    }

    setActiveUid(uid);

    if (actor.side === "player") {
      setAwaitingInput(true);
      processingRef.current = false;
      return; // 等待玩家輸入
    } else {
      await runAiAction(actor);
      setActiveUid(null);
      const nextIdx = idx + 1;
      if (nextIdx >= order.length) setRound((r) => r + 1);
      setTurnIdx(nextIdx);
      processingRef.current = false;
    }
  };

  useEffect(() => {
    if (!awaitingInput && !battleOver) {
      const t = setTimeout(() => advanceTurn(), 400);
      return () => clearTimeout(t);
    }
  }, [turnIdx, allies, enemies, awaitingInput, battleOver]);

  // 勝負判定
  useEffect(() => {
    if (battleOver) return;
    if (allies.every((u) => !u.alive)) {
      setBattleOver("lose");
    } else if (enemies.every((u) => !u.alive)) {
      setBattleOver("win");
    }
  }, [allies, enemies]);

  // buff/debuff 回合結算（每輪結束）
  const prevRound = useRef(1);
  useEffect(() => {
    if (round !== prevRound.current) {
      prevRound.current = round;
      setAllies((a) => tickEndOfTurnStatuses(a));
      setEnemies((e) => tickEndOfTurnStatuses(e));
      pushLog(`── 第 ${round} 回合 ──`);
    }
  }, [round]);

  const handlePlayerAction = async (targetUnit, useUlt) => {
    if (!awaitingInput) return;
    const actor = getUnit(activeUid);
    if (!actor || actor.side !== "player") return;

    setAwaitingInput(false);
    pushLog(`▶ ${actor.name} 使用「${useUlt ? actor.ult.name : actor.skill.name}」`);

    // 手動指定目標（若技能允許）：暫時透過交換目標池模擬
    let targetEnemies = enemies;
    if (targetUnit && targetUnit.side === "enemy" && (actor.skill.type === "single" || (useUlt && actor.ult.type === "single"))) {
      targetEnemies = [targetUnit, ...enemies.filter((e) => e.uid !== targetUnit.uid)];
    }

    const result = executeTurn(actor, allies, targetEnemies, useUlt);
    await playEvents(result.events);
    setAllies(result.allies);
    // 保持原始順序寫回
    setEnemies((prevEnemies) =>
      prevEnemies.map((e) => result.enemies.find((r) => r.uid === e.uid) || e)
    );

    setActiveUid(null);
    setPendingUlt(false);
    const order = turnOrder.filter((uid) => {
      const u = getUnit(uid);
      return u && u.alive;
    });
    const idx = turnIdx % order.length;
    const nextIdx = idx + 1;
    if (nextIdx >= order.length) setRound((r) => r + 1);
    setTurnIdx(nextIdx);
  };

  const activeUnit = activeUid ? getUnit(activeUid) : null;
  const isPlayerTurn = awaitingInput && activeUnit?.side === "player";

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "radial-gradient(ellipse at 50% 0%, #141B2A 0%, #0A0E14 70%)" }}>
      <style>{`
        @keyframes hitshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
        @keyframes healpulse { 0%,100%{box-shadow:0 0 6px #00E5A8} 50%{box-shadow:0 0 24px #00E5A8} }
        @keyframes activeGlow { 0%,100%{box-shadow:0 0 16px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 30px rgba(255,255,255,0.6)} }
      `}</style>

      <div style={{ padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 13, color: "#8B9BB4" }}>{waveName}</span>
        <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 12, color: "#00E5FF" }}>第 {round} 回合</span>
      </div>

      <div ref={arenaRef} style={{ position: "relative", flex: 1, padding: "16px 12px", overflow: "hidden" }}>
        <canvas ref={canvasRef} style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 10 }} />

        {/* 敵方陣容 */}
        <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginBottom: 26 }}>
          {enemies.map((u) => (
            <div key={u.uid} ref={(el) => (cardRefs.current[u.uid] = el)}>
              <UnitCard
                unit={u}
                isActive={activeUid === u.uid}
                isTargetable={isPlayerTurn && u.alive}
                onClick={(unit) => handlePlayerAction(unit, pendingUlt)}
                damageFlash={flashMap[u.uid] === "damage"}
                healFlash={flashMap[u.uid] === "heal"}
              />
            </div>
          ))}
        </div>

        <div style={{ textAlign: "center", color: "#4A5568", fontFamily: "'Share Tech Mono', monospace", fontSize: 10, margin: "8px 0" }}>
          ▲▲▲ 對戰位面 ▲▲▲
        </div>

        {/* 我方陣容 */}
        <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginTop: 26 }}>
          {allies.map((u) => (
            <div key={u.uid} ref={(el) => (cardRefs.current[u.uid] = el)}>
              <UnitCard
                unit={u}
                isActive={activeUid === u.uid}
                isTargetable={false}
                damageFlash={flashMap[u.uid] === "damage"}
                healFlash={flashMap[u.uid] === "heal"}
              />
            </div>
          ))}
        </div>
      </div>

      {/* 玩家操作面板 */}
      {isPlayerTurn && activeUnit && (
        <div style={{ padding: "10px 14px", borderTop: "1px solid rgba(255,255,255,0.08)", background: "#0F1420" }}>
          <div style={{ fontFamily: "'Noto Sans TC', sans-serif", fontSize: 12, color: "#8B9BB4", marginBottom: 8 }}>
            <b style={{ color: "#00E5FF" }}>{activeUnit.name}</b> 的回合 — 選擇技能後點選敵方單位
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button
              onClick={() => setPendingUlt(false)}
              style={{
                flex: 1, padding: "10px 8px", borderRadius: 8, cursor: "pointer",
                background: !pendingUlt ? "linear-gradient(135deg,#00E5FF,#0091A8)" : "#1C2331",
                color: !pendingUlt ? "#0A0E14" : "#8B9BB4", border: "1px solid #00E5FF33",
                fontFamily: "'Noto Sans TC', sans-serif", fontWeight: 700, fontSize: 12,
              }}
            >
              {activeUnit.skill.name}
              <div style={{ fontSize: 9, fontWeight: 400, opacity: 0.8 }}>{activeUnit.skill.desc}</div>
            </button>
            <button
              onClick={() => activeUnit.ultCharge >= activeUnit.ultMaxCharge && setPendingUlt(true)}
              disabled={activeUnit.ultCharge < activeUnit.ultMaxCharge}
              style={{
                flex: 1, padding: "10px 8px", borderRadius: 8,
                cursor: activeUnit.ultCharge >= activeUnit.ultMaxCharge ? "pointer" : "not-allowed",
                background: pendingUlt ? "linear-gradient(135deg,#7C4DFF,#4A2FB8)" : "#1C2331",
                color: pendingUlt ? "#fff" : activeUnit.ultCharge >= activeUnit.ultMaxCharge ? "#7C4DFF" : "#4A5568",
                border: "1px solid #7C4DFF33", fontFamily: "'Noto Sans TC', sans-serif", fontWeight: 700, fontSize: 12,
                opacity: activeUnit.ultCharge >= activeUnit.ultMaxCharge ? 1 : 0.5,
              }}
            >
              ★ {activeUnit.ult.name}
              <div style={{ fontSize: 9, fontWeight: 400, opacity: 0.8 }}>
                {activeUnit.ultCharge >= activeUnit.ultMaxCharge ? activeUnit.ult.desc : `充能中 ${activeUnit.ultCharge}/${activeUnit.ultMaxCharge}`}
              </div>
            </button>
          </div>
          {(activeUnit.skill.type === "aoe" || activeUnit.skill.type === "lowestHp" || (pendingUlt && activeUnit.ult.type === "aoe")) && (
            <button
              onClick={() => handlePlayerAction(null, pendingUlt)}
              style={{
                marginTop: 8, width: "100%", padding: "8px", borderRadius: 8,
                background: "#FF3860", color: "#fff", border: "none", cursor: "pointer",
                fontFamily: "'Noto Sans TC', sans-serif", fontWeight: 700, fontSize: 12,
              }}
            >
              發動技能
            </button>
          )}
        </div>
      )}

      {/* 戰鬥紀錄 */}
      <div style={{
        maxHeight: 70, overflowY: "auto", padding: "6px 14px", background: "#080A0F",
        fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: "#5A6478", borderTop: "1px solid rgba(255,255,255,0.05)",
      }}>
        {log.slice(-6).map((l, i) => <div key={i}>{l}</div>)}
      </div>

      {/* 結算畫面 */}
      {battleOver && (
        <div style={{
          position: "absolute", inset: 0, background: "rgba(5,7,12,0.92)", display: "flex",
          flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 50, gap: 16,
        }}>
          <div style={{
            fontFamily: "'Orbitron', sans-serif", fontSize: 32, fontWeight: 900,
            color: battleOver === "win" ? "#00E5A8" : "#FF3860",
            textShadow: `0 0 24px ${battleOver === "win" ? "#00E5A8" : "#FF3860"}`,
          }}>
            {battleOver === "win" ? "殲滅完成" : "任務失敗"}
          </div>
          <button
            onClick={() => onBattleEnd(battleOver)}
            style={{
              padding: "12px 32px", borderRadius: 10, background: "linear-gradient(135deg,#00E5FF,#7C4DFF)",
              color: "#0A0E14", border: "none", fontFamily: "'Noto Sans TC', sans-serif", fontWeight: 700,
              fontSize: 14, cursor: "pointer",
            }}
          >
            返回基地
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------------- 隊伍編成畫面 ---------------- */

function TeamBuilder({ save, setSave, onStartBattle }) {
  const [selectedWave, setSelectedWave] = useState(save.highestWaveCleared);
  const ownedCards = CARD_POOL.filter((c) => save.ownedCardIds.includes(c.id));

  const toggleTeam = (cardId) => {
    setSave((s) => {
      const inTeam = s.team.includes(cardId);
      if (inTeam) return { ...s, team: s.team.filter((id) => id !== cardId) };
      if (s.team.length >= 5) return s;
      return { ...s, team: [...s.team, cardId] };
    });
  };

  const wave = ENEMY_WAVES[selectedWave];

  return (
    <div style={{ padding: 16, fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, fontWeight: 900, color: "#E8EDF5", letterSpacing: 1 }}>
          機甲戰紀 <span style={{ color: "#00E5FF" }}>MECHA VANGUARD</span>
        </div>
        <div style={{ fontSize: 11, color: "#5A6478", marginTop: 2, fontFamily: "'Share Tech Mono', monospace" }}>
          能量幣: {save.currency} ｜ 已擁有機體: {ownedCards.length}/{CARD_POOL.length}
        </div>
      </div>

      <div style={{ fontSize: 13, color: "#8B9BB4", marginBottom: 8, fontWeight: 700 }}>
        編成隊伍（{save.team.length}/5）
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
        {ownedCards.map((c) => {
          const inTeam = save.team.includes(c.id);
          const level = save.cardLevels[c.id] || 1;
          return (
            <div key={c.id} onClick={() => toggleTeam(c.id)} style={{ position: "relative" }}>
              <UnitCard
                unit={instantiateUnit(c, "player", level)}
                isActive={inTeam}
                isTargetable={true}
                onClick={() => {}}
              />
              {inTeam && (
                <div style={{
                  position: "absolute", top: -6, right: -6, width: 20, height: 20, borderRadius: "50%",
                  background: "#00E5A8", color: "#0A0E14", display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 900,
                }}>✓</div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ fontSize: 13, color: "#8B9BB4", marginBottom: 8, fontWeight: 700 }}>選擇任務關卡</div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {ENEMY_WAVES.map((w, i) => {
          const locked = i > save.highestWaveCleared;
          return (
            <button
              key={i}
              disabled={locked}
              onClick={() => setSelectedWave(i)}
              style={{
                padding: "8px 14px", borderRadius: 8, cursor: locked ? "not-allowed" : "pointer",
                background: selectedWave === i ? "linear-gradient(135deg,#00E5FF,#0091A8)" : "#1C2331",
                color: selectedWave === i ? "#0A0E14" : locked ? "#3A4152" : "#8B9BB4",
                border: "1px solid rgba(255,255,255,0.1)", fontSize: 12, fontWeight: 700,
              }}
            >
              {locked ? "🔒 " : ""}第{i + 1}戰 {w.name}
            </button>
          );
        })}
      </div>

      <div style={{
        padding: 12, borderRadius: 10, background: "#12161F", border: "1px solid rgba(255,56,96,0.2)", marginBottom: 20,
      }}>
        <div style={{ fontSize: 12, color: "#FF3860", fontWeight: 700, marginBottom: 6 }}>敵方陣容：{wave.name}</div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {wave.units.map((u, i) => (
            <span key={i} style={{ fontSize: 10, color: "#8B9BB4", background: "#1C2331", padding: "3px 8px", borderRadius: 6 }}>
              {u.name}
            </span>
          ))}
        </div>
      </div>

      <button
        disabled={save.team.length === 0}
        onClick={() => onStartBattle(selectedWave)}
        style={{
          width: "100%", padding: 14, borderRadius: 10,
          background: save.team.length === 0 ? "#2A303D" : "linear-gradient(135deg,#00E5FF,#7C4DFF)",
          color: save.team.length === 0 ? "#5A6478" : "#0A0E14",
          border: "none", fontFamily: "'Orbitron', sans-serif", fontWeight: 900, fontSize: 15,
          cursor: save.team.length === 0 ? "not-allowed" : "pointer", letterSpacing: 1,
        }}
      >
        出擊
      </button>
    </div>
  );
}

/* ---------------- 主應用程式 ---------------- */

function App() {
  const [save, setSave] = useState(loadSave());
  const [screen, setScreen] = useState("build"); // build | battle
  const [battleData, setBattleData] = useState(null);

  useEffect(() => {
    persistSave(save);
  }, [save]);

  const startBattle = (waveIdx) => {
    const teamCards = save.team.map((id) => CARD_POOL.find((c) => c.id === id));
    const allies = teamCards.map((c) => instantiateUnit(c, "player", save.cardLevels[c.id] || 1));
    const enemies = ENEMY_WAVES[waveIdx].units.map((c) => instantiateUnit(c, "enemy", 1));
    setBattleData({ allies, enemies, waveIdx, waveName: ENEMY_WAVES[waveIdx].name });
    setScreen("battle");
  };

  const onBattleEnd = (result) => {
    if (result === "win") {
      setSave((s) => ({
        ...s,
        currency: s.currency + 80 + battleData.waveIdx * 20,
        highestWaveCleared: Math.max(s.highestWaveCleared, Math.min(battleData.waveIdx + 1, ENEMY_WAVES.length - 1)),
      }));
    }
    setScreen("build");
    setBattleData(null);
  };

  return (
    <div style={{
      width: "100%", height: "100vh", background: "#0A0E14", color: "#E8EDF5",
      fontFamily: "'Noto Sans TC', sans-serif", overflow: "auto",
    }}>
      {screen === "build" && <TeamBuilder save={save} setSave={setSave} onStartBattle={startBattle} />}
      {screen === "battle" && battleData && (
        <div style={{ height: "100vh" }}>
          <BattleScreen
            playerTeam={battleData.allies}
            enemyTeam={battleData.enemies}
            waveName={battleData.waveName}
            onBattleEnd={onBattleEnd}
          />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
} catch (err) {
  var log = document.getElementById('error-log');
  log.style.display = 'block';
  log.textContent = '程式執行錯誤 / RUNTIME ERROR:\n\n' + err.message + '\n\n' + (err.stack || '');
}
</script>
</body>
</html>
